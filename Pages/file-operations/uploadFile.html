<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Files</title>
    <link rel="icon" href="../../Images/test-automation-practice-logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6"
        crossorigin="anonymous">
        <link rel="stylesheet" href="../../Styles/styles.css">
    <script src="../../components/include.js"></script>
</head>

<body>
    <a href="#upload-main" class="visually-hidden-focusable skip-link" tabindex="0">Skip to main content</a>
    <div class="site-header"></div>
    <script src="../../JavaScript/auth.js"></script>
    <script src="../../JavaScript/nav.js"></script>
    <script>enforceAuth('../../index.html');</script>
    <main id="upload-main" class="container py-5" role="main" tabindex="-1">
        <div class="page-header">
            <h1 class="page-title">File Upload</h1>
            <p class="page-subtitle">Practice uploading files using input and custom controls</p>
        </div>
        <div class="mt-4 text-center">
            <h3>Upload your file here</h3>
            <input type="file" id="regularFileInput" class="btn btn-secondary text-center" multiple>
            <ul id="regularFileList"></ul>
        </div>
        <div class="mt-4 text-center">
            <h3>Upload your file here, if you can 👽</h3>
            <div id="fileInputContainer" class="text-center">
                <button type="button" id="chooseFileBtn" class="btn btn-secondary text-center">Choose File </button>
                <input type="file" class="btn btn-secondary text-center" id="fileInput" style="display: none;"  multiple>
                <ul id="fileList" ></ul>
            </div>
        </div>
    </main>
    <script src="../../JavaScript/uploadFiles.js"></script>
    <script src="../../JavaScript/script.js"></script> <!-- Adjusted path -->
    <script>
        // Use doLogout from auth.js for logout
        function logout() {
            if (typeof doLogout === 'function') {
                doLogout();
            } else {
                window.location.href = '../../index.html';
            }
        }
    </script>
    <footer class="site-footer" role="contentinfo"></footer>
<style>
.visually-hidden-focusable.skip-link {
  position: absolute;
  left: -10000px;
  top: auto;
  width: 1px;
  height: 1px;
  overflow: hidden;
  z-index: 10000;
}
.visually-hidden-focusable.skip-link:focus {
  position: static;
  width: auto;
  height: auto;
  padding: 0.5em 1em;
  background: #6366f1;
  color: #fff;
  border-radius: 6px;
  outline: 3px solid #4AAE9B;
  text-decoration: underline;
}
</style>
</body>
</html>
