<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Locator Practice</title>
    <link rel="icon" href="../../Images/test-automation-practice-logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../Styles/styles.css">
    <script src="../../components/include.js"></script>
</head>

<body>
    <div class="site-header"></div>
    <script src="../../JavaScript/auth.js"></script>
    <script src="../../JavaScript/nav.js"></script>
    <script>enforceAuth('../../index.html');</script>

    <div class="container mt-5">
        <h1>ID Locator Practice</h1>
        <p class="lead">Practice finding elements using ID selectors - the most reliable locator strategy.</p>

        <div class="card mt-4">
            <div class="card-header">
                <h5>Elements with IDs</h5>
                <small class="text-muted">Use element IDs to practice locating elements</small>
            </div>
            <div class="card-body">
                <!-- Simple ID elements -->
                <div class="mb-3">
                    <label for="firstName" class="form-label">First Name <span class="text-danger" aria-hidden="true">*</span></label>
                    <input type="text" id="firstName" class="form-control" placeholder="Enter your first name" data-testid="first-name-input" required aria-required="true" aria-describedby="firstName-error">
                    <div class="invalid-feedback" id="firstName-error">First name is required.</div>
                </div>

                <div class="mb-3">
                    <label for="lastName" class="form-label">Last Name <span class="text-danger" aria-hidden="true">*</span></label>
                    <input type="text" id="lastName" class="form-control" placeholder="Enter your last name" data-testid="last-name-input" required aria-required="true" aria-describedby="lastName-error">
                    <div class="invalid-feedback" id="lastName-error">Last name is required.</div>
                </div>

                <div class="mb-3">
                    <label for="userEmail" class="form-label">Email <span class="text-danger" aria-hidden="true">*</span></label>
                    <input type="email" id="userEmail" class="form-control" placeholder="Enter your email" data-testid="email-input" required aria-required="true" aria-describedby="userEmail-error">
                    <div class="invalid-feedback" id="userEmail-error">Email is required.</div>
                </div>

                <div class="mb-3">
                    <button id="submitBtn" class="btn btn-primary" data-testid="submit-button" aria-label="Submit form">Submit</button>
                    <button id="resetBtn" class="btn btn-secondary ms-2" data-testid="reset-button" aria-label="Reset form">Reset</button>
                </div>

                <!-- Result message -->
                <div id="resultMessage" class="alert alert-info d-none" data-testid="result-message" role="alert" aria-live="polite">
                    Form submitted successfully!
                </div>
            </div>
        </div>

    </div>

    <script src="../../JavaScript/script.js"></script>
    <script>


        // Form submission
        document.getElementById('submitBtn')?.addEventListener('click', function(e) {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('userEmail').value;

            if (firstName && lastName && email) {
                document.getElementById('resultMessage').classList.remove('d-none');
            }
        });

        // Reset form
        document.getElementById('resetBtn')?.addEventListener('click', function() {
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('resultMessage').classList.add('d-none');
        });
    </script>

    <footer class="site-footer"></footer>
</body>
</html>
