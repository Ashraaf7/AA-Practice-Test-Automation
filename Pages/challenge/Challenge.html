<!DOCTYPE html>
<html>

  <head>
  
      <link rel="icon" href="../../Images/test-automation-practice-logo.png">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6"
        crossorigin="anonymous">
            <link rel="stylesheet" href="../../Styles/styles.css">
          <title>Challenge 1</title>
    <style>
      /* Styles for form */
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      .container {
        width: 80%;
        margin: auto;
        padding: 20px;
      }
      h1 {
        text-align: center;
      }
      form {
        margin-top: 50px;
      }
      label {
        font-weight: bold;
      }
      input[type="text"],
      select {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        box-sizing: border-box;
      }
      .input-group {
        margin-bottom: 20px;
      }
      .btn {
        display: inline-block;
        padding: 10px 20px;
        background-color: #007bff;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
      }
      .btn:hover {
        background-color: #0056b3;
      }
      .loader {
        border: 8px solid #f3f3f3; /* Light grey */
        border-top: 8px solid #3498db; /* Blue */
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 2s linear infinite;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: none;
        z-index: 999;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .flash-message {
        background-color: #28a745;
        color: #fff;
        padding: 10px;
        text-align: center;
        border-radius: 5px;
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        z-index: 999;
        display: none;
      }
      .error-message {
        background-color: #dc3545;
        color: #fff;
        padding: 10px;
        text-align: center;
        border-radius: 5px;
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        z-index: 999;
        display: none;
      }
    </style>
  </head>

    <script src="../components/include.js"></script>
    <script src="../JavaScript/auth.js"></script>
    <script src="../JavaScript/nav.js"></script>
    <script>enforceAuth('../index.html');</script>
  <body>
    <div class="site-header"></div>
    <main class="container-lg py-4">
      <div class="card shadow-sm p-4 mb-4" style="max-width: 600px; margin: 0 auto; background: var(--card-bg);">
        <div class="mb-3 text-center">
          <h1 class="page-title mb-1" style="color:var(--primary-dark);font-weight:800;">Form Challenge</h1>
          <div class="page-subtitle" style="color:var(--text-secondary);font-size:1.1rem;">Test all your skills in one complete automation challenge</div>
        </div>

      <form id="challenge-form" novalidate aria-labelledby="challenge-form-title">
        <div class="row g-3">
          <div class="col-12">
            <label for="first-name" class="form-label">First name <span class="text-danger" aria-hidden="true">*</span></label>
            <input type="text" class="form-control" id="first-name" name="first-name" placeholder="Enter first name" required aria-required="true" aria-describedby="first-name-error">
            <div class="invalid-feedback" id="first-name-error">First name is required.</div>
          </div>
          <div class="col-12">
            <label for="last-name" class="form-label">Last name <span class="text-danger" aria-hidden="true">*</span></label>
            <input type="text" class="form-control" id="last-name" name="last-name" placeholder="Enter last name" required aria-required="true" aria-describedby="last-name-error">
            <div class="invalid-feedback" id="last-name-error">Last name is required.</div>
          </div>
          <div class="col-12">
            <label for="job-title" class="form-label">Job title <span class="text-danger" aria-hidden="true">*</span></label>
            <input type="text" class="form-control" id="job-title" name="job-title" placeholder="Enter your job title" required aria-required="true" aria-describedby="job-title-error">
            <div class="invalid-feedback" id="job-title-error">Job title is required.</div>
          </div>
          <div class="col-12">
            <label class="form-label">Highest level of education <span class="text-danger" aria-hidden="true">*</span></label>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="education-level" id="radio-button-1" value="high-school" required aria-required="true" aria-describedby="education-error">
              <label class="form-check-label" for="radio-button-1">High School</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="education-level" id="radio-button-2" value="bachelor" required aria-required="true" aria-describedby="education-error">
              <label class="form-check-label" for="radio-button-2">Bachelor's</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="education-level" id="radio-button-3" value="master" required aria-required="true" aria-describedby="education-error">
              <label class="form-check-label" for="radio-button-3">Master's</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="education-level" id="radio-button-4" value="phd" required aria-required="true" aria-describedby="education-error">
                          <div class="invalid-feedback" id="education-error">Education level is required.</div>
              <label class="form-check-label" for="radio-button-4">PhD</label>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Gender <span class="text-danger" aria-hidden="true">*</span></label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" id="checkbox-1" value="male" name="gender" aria-describedby="gender-error">
              <label class="form-check-label" for="checkbox-1">Male</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" id="checkbox-2" value="female" name="gender" aria-describedby="gender-error">
              <label class="form-check-label" for="checkbox-2">Female</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" id="checkbox-3" value="prefer-not-to-say" name="gender" aria-describedby="gender-error">
                          <div class="invalid-feedback" id="gender-error">Please select at least one gender option.</div>
              <label class="form-check-label" for="checkbox-3">Prefer not to say</label>
            </div>
          </div>
          <div class="col-12">
            <label for="select-menu" class="form-label">Years of experience <span class="text-danger" aria-hidden="true">*</span></label>
            <select class="form-select" id="select-menu" name="select-menu" required aria-required="true" aria-describedby="experience-error">
                          <div class="invalid-feedback" id="experience-error">Please select your years of experience.</div>
              <option value="0" selected>Select an option</option>
              <option value="1">0-1</option>
              <option value="2">2-4</option>
              <option value="3">5-9</option>
              <option value="4">10+</option>
            </select>
          </div>
          <div class="col-12 text-center mt-3">
            <button class="btn btn-login px-5" id="submit-btn" type="submit" aria-label="Submit form">Submit</button>
          </div>
        </div>
      </form>
      </div>
    </main>
      </form>

    </div>

    <div class="loader" id="loader"></div>
    <div class="flash-message" id="flash-message" role="status" aria-live="polite">Success</div>
    <div class="error-message" id="error-message" role="alert" aria-live="assertive">Please fill in all fields.</div>

    <script>
      // Script to show flash message on form submission
      document.getElementById('challenge-form').addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent default form submission
        var valid = true;
        // Validate all required fields
        var firstName = document.getElementById('first-name');
        var lastName = document.getElementById('last-name');
        var jobTitle = document.getElementById('job-title');
        var education = document.querySelector('input[name="education-level"]:checked');
        var gender = document.querySelectorAll('input[name="gender"]:checked');
        var experience = document.getElementById('select-menu');

        // Reset error states
        document.querySelectorAll('.invalid-feedback').forEach(function(el) { el.style.display = 'none'; });
        [firstName, lastName, jobTitle, experience].forEach(function(el) { el.classList.remove('is-invalid'); });

        if (!firstName.value.trim()) {
          valid = false;
          firstName.classList.add('is-invalid');
          document.getElementById('first-name-error').style.display = 'block';
        }
        if (!lastName.value.trim()) {
          valid = false;
          lastName.classList.add('is-invalid');
          document.getElementById('last-name-error').style.display = 'block';
        }
        if (!jobTitle.value.trim()) {
          valid = false;
          jobTitle.classList.add('is-invalid');
          document.getElementById('job-title-error').style.display = 'block';
        }
        if (!education) {
          valid = false;
          document.getElementById('education-error').style.display = 'block';
        }
        if (!gender.length) {
          valid = false;
          document.getElementById('gender-error').style.display = 'block';
        }
        if (!experience.value || experience.value === '0') {
          valid = false;
          experience.classList.add('is-invalid');
          document.getElementById('experience-error').style.display = 'block';
        }

        if (!valid) {
          document.getElementById('error-message').style.display = 'block';
          return;
        } else {
          document.getElementById('error-message').style.display = 'none';
        }

        // Simulate loader for 4 seconds
        document.getElementById('loader').style.display = 'block';
        setTimeout(function() {
          document.getElementById('loader').style.display = 'none';

          // Check if all fields are filled
          var firstName = document.getElementById('first-name').value;
          var lastName = document.getElementById('last-name').value;
          var jobTitle = document.getElementById('job-title').value;
          var selectMenu = document.getElementById('select-menu').value;
          var radioButtons = document.querySelectorAll('input[name="education-level"]:checked');
          var checkboxes = document.querySelectorAll('input[name="gender"]:checked');

          if (firstName && lastName && jobTitle && selectMenu != '0' && radioButtons.length > 0 && checkboxes.length > 0) {
            document.getElementById('flash-message').style.display = 'block'; // Show flash message
          } else {
            document.getElementById('error-message').style.display = 'block'; // Show error message
          }
        }, 4000);
      });
    </script>
    <!-- Logout handled by nav.js/auth.js -->
  
    <!-- quick-nav removed for UI consistency -->
    <footer class="site-footer"></footer>
</body>
</html>
